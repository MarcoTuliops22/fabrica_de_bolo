<!DOCTYPE html>
<html lang="pt-br">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Logística - Portal do Motorista</title>
    <link rel="stylesheet" href="style.css">
    <!-- Folha do leaflet apenas preventivamente, mas o maps abre externo para navegação GPS -->

    <link rel="manifest" href="manifest.json">
    <meta name="theme-color" content="#3498db">
    <link rel="apple-touch-icon" href="icon-192x192.png">

    <script>
        if ('serviceWorker' in navigator) {
            window.addEventListener('load', () => {
                navigator.serviceWorker.register('sw.js')
                    .then(reg => console.log('ServiceWorker registrado:', reg.scope))
                    .catch(err => console.log('Falha no registro do ServiceWorker:', err));
            });
        }
    </script>
</head>

<body>

    <div style="display: flex; justify-content: flex-end; margin-bottom: 20px;">
        <button onclick="sairSistema()" style="background-color: #e74c3c;">🚪 Sair (Logout)</button>
    </div>
    
    <header>
        <h1>🚚 Portal do Motorista</h1>
        <p>Acompanhe suas rotas e confirme as entregas em tempo real.</p>
    </header>

    <section class="dashboard">
        <h2>📍 Minhas Entregas Pendentes</h2>
        <p>Abaixo estão os pedidos aguardando despacho. Vá até o local de entrega e peça o código ao cliente para finalizar.</p>
        
        <div id="lista-pendentes" class="cards-motorista" style="display:flex; flex-direction:column; gap: 15px;">
            <!-- Preenchido pelo JS -->
        </div>
    </section>

    <script src="script.js"></script>
</body>

</html>
